{% load static %}

<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscription - GafouShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    html, body {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f0f2f5, #e4e7ec);
    }

    body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    .page-content {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        top: 50%;
        left: 50%;
        width: 320px;
        height: 320px;

        background: url("{% static 'images/Gafoulog.png' %}") no-repeat center;
        background-size: contain;

        transform: translate(-50%, -50%);
        opacity: 0.03;
        z-index: 0;
        pointer-events: none;
    }

    .auth-box {
        position: relative;
        z-index: 2;

        width: 100%;
        max-width: 420px;

        background: white;
        padding: 25px;
        border-radius: 14px;

        box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .logo {
        display: block;
        margin: 0 auto 12px;
        width: 95px;
    }

    h2 {
        text-align: center;
        font-weight: 600;
        margin-bottom: 18px;
        font-size: 22px;
    }

    .form-control {
        border-radius: 8px;
        padding: 10px;
        font-size: 14px;
    }

    .form-control:focus {
        border-color: #0071dc;
        box-shadow: 0 0 0 2px rgba(0,113,220,0.2);
    }

    .btn-primary {
        background: #0071dc;
        border: none;
        border-radius: 8px;
        padding: 10px;
        font-weight: 600;
    }

    .btn-primary:hover {
        background: #005bb5;
    }

    a {
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    /* ERROR MESSAGE */
    .message-box {
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 15px;
        text-align: center;
        font-size: 14px;
        font-weight: 600;
    }

    .error-box {
        background: #ffe5e5;
        color: #d60000;
    }

    .success-box {
        background: #e7ffe7;
        color: #008000;
    }

    .footer {
        background: linear-gradient(135deg, #0f172a, #111827);
        color: white;
        padding: 20px;
        width: 100%;
    }

    .footer-bottom {
        text-align: center;
        font-size: 12px;
        color: #94a3b8;
    }

    @media (max-width: 600px) {

        .auth-box {
            max-width: 95%;
            padding: 18px;
        }
    }

    </style>

</head>

<body>

<div class="page-content">

    <div class="auth-box">

        <img src="{% static 'images/Gafoulog.png' %}" class="logo" alt="Logo">

        <h2>Créer un compte</h2>

        <!-- MESSAGES -->
        {% if messages %}

            {% for message in messages %}

                <div class="message-box
                    {% if message.tags == 'error' %}
                        error-box
                    {% else %}
                        success-box
                    {% endif %}
                ">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

        <!-- FORM -->
        <form method="POST">

            {% csrf_token %}

            <input
                class="form-control mb-2"
                type="text"
                name="prenom"
                placeholder="Prénom"
                required
            >

            <input
                class="form-control mb-2"
                type="text"
                name="nom"
                placeholder="Nom"
                required
            >

            <input
                class="form-control mb-2"
                type="text"
                name="telephone"
                placeholder="Téléphone"
                required
            >

            <textarea
                class="form-control mb-2"
                name="adresse"
                placeholder="Adresse"
                required
            ></textarea>

            <input
                class="form-control mb-2"
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                class="form-control mb-2"
                type="text"
                name="username"
                placeholder="Nom d'utilisateur"
                required
            >

            <input
                class="form-control mb-3"
                type="password"
                name="password"
                placeholder="Mot de passe"
                required
            >

            <button class="btn btn-primary w-100">
                S'inscrire
            </button>

        </form>

        <p class="text-center mt-3">

            Déjà un compte ?

            <a href="{% url 'login' %}">
                Se connecter
            </a>

        </p>

    </div>

</div>

<footer class="footer">

    <div class="footer-bottom">
        © 2026 GafouShop - Tous droits réservés
    </div>

</footer>

</body>
</html>
