<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Boutique bloquée</title>

<style>

body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:500px;
    background:#111827;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

.logo{
    width:100px;
    margin-bottom:20px;
}

h1{
    color:red;
}

.msg{
    margin-top:20px;
    line-height:1.8;
    color:#ddd;
}

.hexa{
    margin-top:30px;
    color:#3b82f6;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

    <img src="/static/logo.png" class="logo">

    <h1>🔒 Boutique bloquée</h1>

    <div class="msg">

        Cette boutique a été suspendue par l’administration.

        <br><br>

        Raison :
        {{ boutique.raison_blocage }}

    </div>

    <div class="hexa">
        HEXAQUEBEC SECURITY SYSTEM
    </div>

</div>

</body>
</html>
